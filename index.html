<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spotify 中文字幕窗口</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="lyrics-pane" aria-label="Lyrics window">
        <div class="track-bar">
          <div>
            <div id="trackTitle" class="track-title">未连接 Spotify</div>
            <div id="trackMeta" class="track-meta">连接后会自动同步当前播放</div>
          </div>
          <div class="window-tools">
            <button id="miniToggle" class="icon-toggle hidden" type="button" title="字幕条模式">字幕条</button>
            <button id="pinToggle" class="icon-toggle hidden" type="button" title="永远置顶">置顶</button>
            <div id="playState" class="state-dot" title="Playback state"></div>
          </div>
        </div>
        <button id="restoreBtn" class="restore-button hidden" type="button">还原</button>

        <div id="lyricsViewport" class="lyrics-viewport">
          <div id="lyricsList" class="lyrics-list">
            <div class="empty-state">连接 Spotify，或粘贴 LRC 歌词开始。</div>
          </div>
        </div>
      </section>

      <aside class="control-panel">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="connect" type="button">连接</button>
          <button class="tab" data-tab="lyrics" type="button">歌词</button>
          <button class="tab" data-tab="style" type="button">样式</button>
        </div>

        <section class="panel-page active" id="tab-connect">
          <div id="connectedSummary" class="connected-summary hidden">
            <div>
              <strong>已连接 Spotify</strong>
              <span>配置已保存，下次会自动恢复。</span>
            </div>
            <button id="editSettingsBtn" class="secondary" type="button">编辑配置</button>
          </div>
          <label class="setup-only">
            Spotify Client ID
            <input id="clientId" autocomplete="off" placeholder="粘贴你的 Client ID">
          </label>
          <div class="button-row setup-only">
            <button id="connectBtn" type="button">Connect Spotify</button>
            <button id="disconnectBtn" class="secondary" type="button">断开</button>
          </div>
          <p class="hint setup-only">Redirect URI: <code id="redirectUri"></code></p>
          <label>
            翻译服务
            <select id="translator">
              <option value="openai">OpenAI API</option>
              <option value="mymemory">MyMemory 免费接口</option>
              <option value="libre">LibreTranslate</option>
              <option value="off">关闭自动翻译</option>
            </select>
          </label>
          <label id="openAiModelWrap" class="hidden">
            OpenAI Model
            <input id="openAiModel" placeholder="gpt-4.1-mini">
          </label>
          <label id="openAiKeyWrap" class="hidden setup-only">
            OpenAI API Key
            <input id="openAiKey" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <div id="saveConfigRow" class="button-row hidden setup-only">
            <button id="saveConfigBtn" type="button">保存配置</button>
            <button id="testOpenAiBtn" class="secondary" type="button">测试 OpenAI</button>
          </div>
          <button id="hideSettingsBtn" class="secondary wide-button setup-only" type="button">收起</button>
          <p id="openAiStatus" class="hint hidden"></p>
          <label id="libreUrlWrap" class="hidden">
            LibreTranslate URL
            <input id="libreUrl" placeholder="https://libretranslate.com/translate">
          </label>
          <label id="openAtLoginWrap" class="check-line hidden">
            <input id="openAtLogin" type="checkbox">
            开机自启
          </label>
        </section>

        <section class="panel-page" id="tab-lyrics">
          <div class="button-row">
            <button id="fetchLyricsBtn" type="button">查找歌词</button>
            <button id="translateBtn" class="secondary" type="button">翻译当前歌词</button>
          </div>
          <label>
            LRC / ChatGPT 翻译
            <textarea id="manualLrc" spellcheck="false" placeholder="[00:12.00] First line...&#10;&#10;也可以粘贴 ChatGPT 翻译结果。"></textarea>
          </label>
          <div class="button-row">
            <button id="loadManualBtn" type="button">载入 LRC</button>
            <button id="copyChatGptBtn" class="secondary" type="button">复制给 ChatGPT</button>
          </div>
          <button id="importTranslationBtn" type="button">导入翻译</button>
          <p id="statusText" class="status">准备就绪</p>
        </section>

        <section class="panel-page" id="tab-style">
          <label>
            字号
            <input id="fontSize" type="range" min="18" max="42" value="28">
          </label>
          <label>
            透明度
            <input id="opacity" type="range" min="65" max="100" value="92">
          </label>
          <label class="check-line">
            <input id="showOriginal" type="checkbox" checked>
            显示原文
          </label>
          <label class="check-line">
            <input id="compactMode" type="checkbox">
            紧凑字幕条
          </label>
          <label class="check-line">
            <input id="transparentBg" type="checkbox">
            透明背景
          </label>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
